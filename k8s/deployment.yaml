apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-app

spec:
  replicas: 2

  selector:
    matchLabels:
      key: flask-app

  template:
    metadata:
      labels:
        key: flask-app

    spec:
      containers:
        - name: flask-app
          image: tejalmanekar23/flask-k8s-auth-pipeline:latest

          ports:
            - containerPort: 5000

          env:
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: flask-secret
                  key: MYSQL_USER

            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flask-secret
                  key: MYSQL_PASSWORD

            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: flask-secret
                  key: MYSQL_ENDPOINT

            - name: MYSQL_DB
              value: flask_db

          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
